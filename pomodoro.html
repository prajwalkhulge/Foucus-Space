<!DOCTYPE html>
<html>
<head>
<title>Pomodoro Timer</title>
<link rel="stylesheet" href="style.css">

<style>

.timer-container{
text-align:center;
margin-top:120px;
}

#time{
font-size:80px;
margin:30px 0;
}

.controls button{
padding:12px 22px;
margin:8px;
border:none;
border-radius:8px;
background:#1f1f1f;
color:white;
cursor:pointer;
}

.controls button:hover{
background:#333;
}

.mode-buttons button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
background:#181818;
color:#ccc;
cursor:pointer;
}

.mode-buttons button:hover{
background:#2a2a2a;
}

.custom{
margin-top:25px;
}

input{
padding:8px;
width:80px;
text-align:center;
}

.sessions{
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<nav>
<h2>Pomodoro Timer</h2>
<a href="tools.html">Back</a>
</nav>

<div class="timer-container">

<h1 id="time">25:00</h1>

<div class="controls">
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

<div class="mode-buttons">

<button onclick="setMode(25)">Pomodoro</button>
<button onclick="setMode(5)">Short Break</button>
<button onclick="setMode(15)">Long Break</button>

</div>

<div class="custom">

<p>Custom Minutes</p>

<input id="customInput" placeholder="min">

<button onclick="setCustom()">Set</button>

</div>

<div class="sessions">

Sessions Completed: <span id="sessions">0</span>

</div>

</div>

<script>

let time=1500
let timer=null
let running=false
let sessions=0

function updateDisplay(){

let m=Math.floor(time/60)
let s=time%60

document.getElementById("time").innerText=
m+":"+(s<10?"0":"")+s

}

function start(){

if(running) return

running=true

timer=setInterval(function(){

if(time<=0){

clearInterval(timer)

running=false

sessions++

document.getElementById("sessions").innerText=sessions

alert("Session Complete")

return

}

time--

updateDisplay()

},1000)

}

function pause(){

clearInterval(timer)

running=false

}

function reset(){

pause()

time=1500

updateDisplay()

}

function setMode(minutes){

pause()

time=minutes*60

updateDisplay()

}

function setCustom(){

let mins=document.getElementById("customInput").value

if(mins>0){

pause()

time=mins*60

updateDisplay()

}

}

updateDisplay()

</script>

</body>
</html>
